name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t remarkable-templates:ci .
      - name: Start container
        run: docker run -d --name rt -p 3000:3000 remarkable-templates:ci
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          docker logs rt
          exit 1
      - name: Verify API responds
        run: |
          curl -sf http://localhost:3000/templates/templates.json | head -c 200
          echo
          curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/api/devices
      - name: Print logs on failure
        if: failure()
        run: docker logs rt
